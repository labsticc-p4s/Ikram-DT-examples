server:
  port: ${LAMP_PORT:8081}

lamp:
  id:                   ${LAMP_ID:LAMP-001}
  host:                 ${LAMP_HOST:physical-service-1}
  description:          ${LAMP_DESCRIPTION:Lamp}
  room:                 ${LAMP_ROOM:default}
  hasTemperatureSensor: ${LAMP_HAS_TEMPERATURE_SENSOR:true}
  hasRoomTempSensor:    ${LAMP_HAS_ROOM_TEMP_SENSOR:true}
  maxWatts:             ${LAMP_MAX_WATTS:60.0}
  maxLifeMinutes:       ${LAMP_MAX_LIFE_MINUTES:1500000.0}

spring:
  application:
    name: physical-service
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: latest